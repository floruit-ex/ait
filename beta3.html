<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Intent跳转助手 - Beta版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #fff;
            --bg2: #f8f9fa;
            --text: #333;
            --text2: #666;
            --primary: #2196f3;
            --primary-light: #42a5f5;
            --primary-dark: #1976d2;
            --border: #dee2e6;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.12);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --animation-duration: 0.4s;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --bg2: #2a2a2a;
            --text: #fff;
            --text2: #ccc;
            --primary: #64b5f6;
            --primary-light: #90caf9;
            --primary-dark: #42a5f5;
            --border: #444;
            --shadow: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.5;
            padding: 16px;
            min-height: 100vh;
            transition: var(--transition);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 8px;
            animation: fadeIn var(--animation-duration) ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 8px;
            word-break: break-word;
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            position: relative;
        }

        h1 .beta-badge {
            position: absolute;
            top: -8px;
            right: -20px;
            font-size: 0.6rem;
            background: #ff9800;
            color: white;
            padding: 2px 8px;
            border-radius: 8px;
            transform: scale(0.8);
        }

        .help-link {
            display: inline-block;
            margin: 8px 0 16px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition);
        }

        .help-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
            transform: translateY(-1px);
        }

        .subtitle {
            color: var(--text2);
            margin: 0 auto 16px;
            padding: 12px 16px;
            background: var(--bg2);
            border-radius: var(--radius);
            max-width: 800px;
            border-left: 4px solid var(--primary);
            word-break: break-word;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: fadeIn var(--animation-duration) ease-out 0.1s both;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0;
            flex-wrap: wrap;
            animation: fadeIn var(--animation-duration) ease-out 0.2s both;
        }

        .stat-item {
            text-align: center;
            padding: 16px 20px;
            background: var(--bg2);
            border-radius: var(--radius);
            min-width: 120px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary-light), var(--primary-dark));
        }

        .stat-item:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px) scale(1.02);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 4px;
            transition: var(--transition);
        }

        .stat-item:hover .stat-value {
            transform: scale(1.05);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text2);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            justify-content: center;
            max-width: 100%;
            padding: 0 8px;
            animation: fadeIn var(--animation-duration) ease-out 0.3s both;
        }

        .filter-btn {
            padding: 10px 18px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: var(--transition);
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .filter-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            transition: 0.5s;
            transform: skewX(-15deg);
        }

        .filter-btn:hover::after {
            left: 100%;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 6px rgba(33, 150, 243, 0.2);
            transform: translateY(-2px);
        }

        .filter-btn:hover:not(.active) {
            border-color: var(--primary-light);
            color: var(--primary);
            background: var(--bg2);
            transform: translateY(-1px);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
            animation: fadeIn var(--animation-duration) ease-out 0.4s both;
        }

        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            body { padding: 12px; }
            .stat-item { min-width: 100px; padding: 12px 16px; }
            .filter-btn { padding: 8px 14px; }
        }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            word-break: break-word;
            overflow-wrap: break-word;
            transition: var(--transition);
            animation: slideUp var(--animation-duration) ease-out;
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:nth-child(odd) {
            animation-delay: 0.1s;
        }

        .card:nth-child(even) {
            animation-delay: 0.2s;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
            transform: translateY(-3px) scale(1.01);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-badge {
            padding: 5px 12px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
            color: white;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            box-shadow: 0 2px 4px rgba(33, 150, 243, 0.2);
            transition: var(--transition);
        }

        .card-badge:hover {
            transform: scale(1.05);
        }

        .card-type {
            font-size: 0.75rem;
            color: var(--text2);
            background: var(--bg2);
            padding: 4px 10px;
            border-radius: 12px;
            white-space: nowrap;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .card-type:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }

        .card-title {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 10px;
            color: var(--text);
            line-height: 1.4;
            word-break: break-word;
            overflow-wrap: break-word;
            position: relative;
            padding-left: 4px;
        }

        .card-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 2px;
            background: var(--primary-light);
            opacity: 0;
            transition: var(--transition);
        }

        .card:hover .card-title::before {
            opacity: 1;
        }

        .card-desc {
            color: var(--text2);
            font-size: 0.9rem;
            margin-bottom: 14px;
            line-height: 1.4;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .card-path {
            background: var(--bg2);
            padding: 12px;
            border-radius: var(--radius);
            font-family: 'Courier New', Consolas, Monaco, monospace;
            font-size: 0.85rem;
            margin-bottom: 14px;
            word-break: break-all;
            word-wrap: break-word;
            white-space: pre-wrap;
            border: 1px solid var(--border);
            max-width: 100%;
            overflow: visible;
            transition: var(--transition);
            cursor: pointer;
        }

        .card-path:hover {
            border-color: var(--primary-light);
            background: rgba(66, 165, 245, 0.05);
            transform: translateX(2px);
        }

        .card-path.active {
            animation: highlight 1s ease;
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }

        @keyframes highlight {
            0% { border-color: var(--primary-light); }
            50% { border-color: #4CAF50; background: rgba(76, 175, 80, 0.2); }
            100% { border-color: var(--primary-light); }
        }

        .card-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 14px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
            white-space: nowrap;
            min-width: 90px;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
            color: white;
            flex: 1;
            box-shadow: 0 2px 4px rgba(33, 150, 243, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(33, 150, 243, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: var(--bg2);
            color: var(--text);
            border: 1px solid var(--border);
            flex: 1;
        }

        .btn-secondary:hover {
            background: var(--primary-light);
            color: white;
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .form-container {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: fadeIn var(--animation-duration) ease-out 0.5s both;
        }

        .form-container:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .form-title {
            font-weight: 600;
            font-size: 1.15rem;
            margin-bottom: 18px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .form-input {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg2);
            color: var(--text);
            width: 100%;
            box-sizing: border-box;
            transition: var(--transition);
            font-size: 0.9rem;
            position: relative;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
            background: var(--bg);
            transform: translateY(-1px);
        }

        .form-input:focus::placeholder {
            color: var(--primary-light);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .footer {
            text-align: center;
            color: var(--text2);
            font-size: 0.85rem;
            margin-top: 32px;
            padding: 20px 0 16px;
            border-top: 1px solid var(--border);
            word-break: break-word;
            animation: fadeIn var(--animation-duration) ease-out 0.6s both;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .footer a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
            transform: translateY(-1px);
        }

        .theme-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            z-index: 100;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .theme-btn:hover {
            transform: rotate(15deg) scale(1.1);
            box-shadow: var(--shadow-hover);
            animation: none;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius);
            z-index: 100;
            opacity: 0;
            transition: var(--transition);
            max-width: 400px;
            width: 90%;
            text-align: center;
            word-break: break-word;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }

        .toast.show { 
            opacity: 1; 
            transform: translateX(-50%) translateY(0);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .toast.success { 
            background: #4CAF50; 
            border-left-color: #4CAF50;
        }
        .toast.error { 
            background: #F44336; 
            border-left-color: #F44336;
        }
        .toast.warning { 
            background: #FF9800; 
            border-left-color: #FF9800;
        }
        .toast.info { 
            background: #2196F3; 
            border-left-color: #2196F3;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Android Intent跳转助手 <span class="beta-badge">Beta</span></h1>
            <a href="help.html" class="help-link">📖 帮助中心</a>
            <p class="subtitle">Beta版 - 新增更多安卓设置Intent指令，支持更多场景</p>
            <p class="subtitle">适用于 悟空浏览器，今日头条(含极速版)，夸克。非全部，其他未测试。</p>
            <p class="subtitle">不适用于(已知) WPS，QQ，Edge，Via(存疑)</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="total-count">50</div>
                    <div class="stat-label">总方法数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="custom-count">0</div>
                    <div class="stat-label">自定义</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="attempt-count">0</div>
                    <div class="stat-label">尝试次数</div>
                </div>
            </div>
        </header>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="developer">开发者选项</button>
            <button class="filter-btn" data-filter="about">关于设备</button>
            <button class="filter-btn" data-filter="accessibility">无障碍</button>
            <button class="filter-btn" data-filter="security">安全设置</button>
            <button class="filter-btn" data-filter="vpn">VPN设置</button>
            <button class="filter-btn" data-filter="apn">APN设置</button>
            <button class="filter-btn" data-filter="bluetooth">蓝牙设置</button>
            <button class="filter-btn" data-filter="wifi">WiFi设置</button>
            <button class="filter-btn" data-filter="battery">电池设置</button>
            <button class="filter-btn" data-filter="app">应用管理</button>
            <button class="filter-btn" data-filter="display">显示设置</button>
            <button class="filter-btn" data-filter="sound">声音设置</button>
            <button class="filter-btn" data-filter="storage">存储设置</button>
            <button class="filter-btn" data-filter="location">定位设置</button>
            <button class="filter-btn" data-filter="notification">通知设置</button>
            <button class="filter-btn" data-filter="hotspot">个人热点</button>
            <button class="filter-btn" data-filter="account">账户设置</button>
            <button class="filter-btn" data-filter="language">语言设置</button>
            <button class="filter-btn" data-filter="custom">自定义</button>
        </div>

        <div id="cards-container" class="cards-grid"></div>

        <div class="form-container">
            <div class="form-title">添加自定义Intent</div>
            <div class="form-grid">
                <input type="text" class="form-input" id="custom-package" placeholder="包名" value="com.android.settings">
                <input type="text" class="form-input" id="custom-classname" placeholder="完整类名">
                <input type="text" class="form-input" id="custom-name" placeholder="显示名称">
                <input type="text" class="form-input" id="custom-desc" placeholder="描述信息">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" id="clear-btn">清空</button>
                <button class="btn btn-primary" id="add-btn">添加</button>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 Android Intent 跳转助手 (Beta版) 丨© 2025 Catiflytek 小助手丨 <span id="success-count">0</span> 成功 | <span id="total-attempts">0</span> 尝试 | <a href="help.html">帮助中心</a></p>
        </div>
    </div>

    <button class="theme-btn" id="theme-btn">🌙</button>
    <div class="toast" id="toast"></div>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && prefersDark.matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
            }
            
            themeBtn.onclick = () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    themeBtn.textContent = '🌙';
                    localStorage.setItem('theme', 'light');
                    showToast('已切换到浅色主题', 'info');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeBtn.textContent = '☀️';
                    localStorage.setItem('theme', 'dark');
                    showToast('已切换到深色主题', 'info');
                }
            };
        }

        const intents = [
            {id:1, title:"开发者选项 (Settings$DevelopmentSettingsActivity)", desc:"直接调用开发者选项Activity", path:"intent:#Intent;component=com.android.settings/.Settings$DevelopmentSettingsActivity;end", cat:"developer", type:"组件启动"},
            {id:2, title:"开发者选项 (Settings$DevelopmentSettingsDashboardActivity)", desc:"新版开发者选项Dashboard", path:"intent:#Intent;component=com.android.settings/.Settings$DevelopmentSettingsDashboardActivity;end", cat:"developer", type:"组件启动"},
            {id:3, title:"开发者选项 (DevelopmentSettings)", desc:"旧版开发者设置", path:"intent:#Intent;component=com.android.settings/.DevelopmentSettings;end", cat:"developer", type:"组件启动"},
            {id:4, title:"开发者选项 (系统标准动作)", desc:"使用APPLICATION_DEVELOPMENT_SETTINGS动作", path:"intent:#Intent;action=android.settings.APPLICATION_DEVELOPMENT_SETTINGS;end", cat:"developer", type:"系统动作"},
            {id:5, title:"开发者选项 (加载设置片段)", desc:"在SubSettings中加载DevelopmentSettingsDashboardFragment", path:"intent:#Intent;component=com.android.settings/.SubSettings;S.%3Asettings%3Ashow_fragment=com.android.settings.development.DevelopmentSettingsDashboardFragment;end", cat:"developer", type:"Fragment启动"},
            {id:6, title:"开发者选项 (Activity+Fragment)", desc:"通过SettingsActivity加载开发者选项Fragment", path:"intent:#Intent;action=android.intent.action.MAIN;launchFlags=0x10810000;component=com.android.settings/.SettingsActivity;S.%3Asettings%3Ashow_fragment=com.android.settings.development.DevelopmentSettingsDashboardFragment;end", cat:"developer", type:"Activity+Fragment"},
            {id:7, title:"关于设备 (DeviceInfoSettingsActivity)", desc:"设备信息设置", path:"intent:#Intent;component=com.android.settings/.Settings$DeviceInfoSettingsActivity;end", cat:"about", type:"组件启动"},

            {id:46, title:"账户设置 (AccountSettingsActivity)", desc:"账户与同步设置", path:"intent:#Intent;component=com.android.settings/.Settings$AccountSettingsActivity;end", cat:"account", type:"组件启动"},
            {id:47, title:"账户设置 (系统标准动作)", desc:"使用ADD_ACCOUNT_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.ADD_ACCOUNT_SETTINGS;end", cat:"account", type:"系统动作"},
            {id:48, title:"语言设置 (LanguageSettingsActivity)", desc:"系统语言设置", path:"intent:#Intent;component=com.android.settings/.Settings$LanguageSettingsActivity;end", cat:"language", type:"组件启动"},
            {id:49, title:"语言设置 (系统标准动作)", desc:"使用INPUT_METHOD_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.INPUT_METHOD_SETTINGS;end", cat:"language", type:"系统动作"},
            {id:50, title:"日期时间设置 (DateTimeSettingsActivity)", desc:"日期和时间设置", path:"intent:#Intent;component=com.android.settings/.Settings$DateTimeSettingsActivity;end", cat:"language", type:"组件启动"}
        ];

        const state = {
            attempts: 0,
            successes: 0,
            filter: 'all',
            customIntents: JSON.parse(localStorage.getItem('customIntentsBeta') || '[]')
        };

        const catNames = {
            developer: '开发者选项',
            about: '关于设备',
            accessibility: '无障碍',
            security: '安全设置',
            vpn: 'VPN设置',
            apn: 'APN设置',
            bluetooth: '蓝牙设置',
            wifi: 'WiFi设置',
            battery: '电池设置',
            app: '应用管理',
            display: '显示设置',
            sound: '声音设置',
            storage: '存储设置',
            location: '定位设置',
            notification: '通知设置',
            hotspot: '个人热点',
            account: '账户设置',
            language: '语言设置',
            custom: '自定义'
        };

        function renderCards() {
            try {
                const container = document.getElementById('cards-container');
                const allIntents = [...intents, ...state.customIntents.map((c, i) => ({...c, id: 2000+i, cat: 'custom', type: '自定义'}))];
                const filtered = state.filter === 'all' ? allIntents : allIntents.filter(i => i.cat === state.filter);
                
                let html = '';
                filtered.forEach((item, index) => {
                    const escapedPath = encodeURIComponent(item.path).replace(/'/g, '&apos;').replace(/"/g, '&quot;');
                    
                    html += `
                        <div class="card" style="animation-delay: ${0.1 + (index % 10) * 0.05}s">
                            <div class="card-header">
                                <div class="card-badge">${catNames[item.cat] || '其他'}</div>
                                <div class="card-type">${item.type}</div>
                            </div>
                            <div class="card-title">${item.title}</div>
                            <div class="card-desc">${item.desc}</div>
                            <div class="card-path" onclick="selectPath(this)">${item.path}</div>
                            <div class="card-actions">
                                <button class="btn btn-primary" onclick="tryLaunch('${escapedPath}', ${item.id})">尝试跳转</button>
                                <button class="btn btn-secondary" onclick="copyPath('${escapedPath}', ${item.id})">复制路径</button>
                                ${item.cat === 'custom' ? `<button class="btn btn-secondary" onclick="deleteIntent(${item.id})">删除</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                updateStats();
            } catch (error) {
                console.error(error);
                showToast('页面加载出错，请刷新重试', 'error');
            }
        }

        function updateStats() {
            const total = intents.length + state.customIntents.length;
            document.getElementById('total-count').textContent = total;
            document.getElementById('custom-count').textContent = state.customIntents.length;
            document.getElementById('attempt-count').textContent = state.attempts;
            document.getElementById('success-count').textContent = state.successes;
            document.getElementById('total-attempts').textContent = state.attempts;
        }

        function tryLaunch(path, id) {
            state.attempts++;
            showToast(`尝试跳转中... (ID: ${id})`, 'info');
            
            const buttons = document.querySelectorAll('.btn-primary');
            const btn = Array.from(buttons).find(b => b.onclick.toString().includes(`tryLaunch('${path}', ${id})`));
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = `<span class="loader"></span>跳转中`;
            }
            
            try {
                const decodedPath = decodeURIComponent(path);
                window.location.href = decodedPath;
                setTimeout(() => {
                    showToast('跳转可能被阻止', 'warning');
                    if (btn) {
                        btn.disabled = false;
                        btn.innerHTML = '尝试跳转';
                    }
                }, 1000);
            } catch(e) {
                showToast(`跳转失败`, 'error');
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '尝试跳转';
                }
            }
            
            updateStats();
        }

        function copyPath(text, id) {
            const decodedText = decodeURIComponent(text);
            navigator.clipboard.writeText(decodedText).then(() => {
                showToast(`已复制到剪贴板`, 'success');
                const paths = document.querySelectorAll('.card-path');
                const pathEl = Array.from(paths).find(p => p.textContent === decodedText);
                if (pathEl) {
                    pathEl.classList.add('active');
                    setTimeout(() => pathEl.classList.remove('active'), 1000);
                }
            });
        }

        function selectPath(el) {
            const range = document.createRange();
            range.selectNodeContents(el);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            showToast('路径已选中', 'info');
        }

        function deleteIntent(id) {
            state.customIntents = state.customIntents.filter((_, i) => 2000+i !== id);
            localStorage.setItem('customIntentsBeta', JSON.stringify(state.customIntents));
            renderCards();
            showToast('已删除', 'success');
        }

        document.getElementById('add-btn').onclick = () => {
            const pkg = document.getElementById('custom-package').value.trim();
            const cls = document.getElementById('custom-classname').value.trim();
            const name = document.getElementById('custom-name').value.trim();
            const desc = document.getElementById('custom-desc').value.trim();
            
            if (!pkg || !cls) {
                showToast('包名和类名不能为空', 'error');
                return;
            }
            
            const path = `intent:#Intent;component=${pkg}/${cls};end`;
            state.customIntents.push({
                title: name || `打开 ${cls}`,
                desc: desc || `自定义Intent: ${pkg}/${cls}`,
                path: path
            });
            
            localStorage.setItem('customIntentsBeta', JSON.stringify(state.customIntents));
            renderCards();
            showToast('添加成功', 'success');
            
            document.getElementById('custom-classname').value = '';
            document.getElementById('custom-name').value = '';
            document.getElementById('custom-desc').value = '';
        };

        document.getElementById('clear-btn').onclick = () => {
            document.getElementById('custom-package').value = 'com.android.settings';
            document.getElementById('custom-classname').value = '';
            document.getElementById('custom-name').value = '';
            document.getElementById('custom-desc').value = '';
            showToast('表单已清空', 'info');
        };

        let toastTimer = null;
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast';
            toast.classList.add(type);
            
            toast.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.remove(type);
            }, 2000);
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => btn.style.transform = '', 100);
                
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.filter = btn.dataset.filter;
                renderCards();
            };
        });

        function init() {
            initTheme();
            renderCards();
            setTimeout(() => showToast('Android Intent Beta版已就绪', 'info'), 500);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
