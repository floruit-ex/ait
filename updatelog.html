<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新日志 - Android Intent Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #f5f5f5;
            --bg2: #ffffff;
            --text: #333333;
            --text2: #666666;
            --text3: #8c8c8c;
            --primary: #1890ff;
            --primary-light: #40a9ff;
            --primary-dark: #096dd9;
            --border: #e8e8e8;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --bg2: #1e1e1e;
            --text: #ffffff;
            --text2: #aaaaaa;
            --text3: #bfbfbf;
            --primary: #40a9ff;
            --primary-light: #69c0ff;
            --primary-dark: #1890ff;
            --border: #303030;
            --shadow: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            padding: 20px 16px;
            min-height: 100vh;
            transition: var(--transition);
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 16px;
            word-break: break-word;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        h1 .title-badge {
            background: var(--primary);
            color: white;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin: 8px 0 16px;
            flex-wrap: wrap;
        }
        
       .nav-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .nav-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
            transform: translateY(-1px);
        }

        .subtitle {
            color: var(--text2);
            margin: 0 auto 12px;
            padding: 12px 16px;
            background: var(--bg2);
            border-radius: var(--radius);
            max-width: 900px;
            border-left: 4px solid var(--primary);
            word-break: break-word;
            font-size: 1.05rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 16px 24px;
            background: var(--bg2);
            border-radius: var(--radius);
            min-width: 120px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .stat-item:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text2);
        }

        .filters-group {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-label {
            color: var(--text3);
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 100%;
            padding: 0 8px;
        }

        .filter-btn {
            padding: 10px 20px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: var(--transition);
            font-weight: 500;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 6px rgba(24, 144, 255, 0.3);
        }

        .filter-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
            width: 100%;
        }

        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow);
            word-break: break-word;
            overflow-wrap: break-word;
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
            transform: translateY(-3px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-type {
            font-size: 0.75rem;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
            font-weight: 500;
        }
        .card-type.owner { background: var(--primary); }
        .card-type.stable { background: #52c41a; }
        .card-type.beta { background: #fa8c16; }
        .card-type.none { background: #8c8c8c; }

        .card-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 6px;
            color: var(--text);
            line-height: 1.3;
        }

        .card-desc {
            color: var(--text2);
            font-size: 0.9rem;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .card-meta {
            color: var(--text2);
            font-size: 0.8rem;
            font-family: 'Courier New', Consolas, Monaco, monospace;
        }

        .footer {
            text-align: center;
            color: var(--text2);
            font-size: 0.9rem;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            word-break: break-word;
        }

        .theme-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.4rem;
            z-index: 100;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-hover);
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 400px;
            width: 90%;
            text-align: center;
            word-break: break-word;
        }

        .toast.show { 
            opacity: 1; 
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: #52c41a; }
        .toast.error { background: #ff4d4f; }
        .toast.warning { background: #fa8c16; }
        .toast.info { background: var(--primary); }

        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            body { padding: 12px; }
            h1 { font-size: 1.8rem; }
            .stat-item { min-width: 100px; padding: 12px 16px; }
            .nav-links { gap: 12px; }
            .filters-group { flex-direction: column; align-items: flex-start; gap: 8px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            h1 .title-badge { font-size: 0.8rem; padding: 1px 6px; }
            .subtitle { font-size: 0.95rem; padding: 10px 12px; }
            .card { padding: 14px; }
        }

        @media (min-width: 1600px) {
            .container { max-width: 1600px; }
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header> 
            <h1>Android Intent Tool<br>开发：Fusion_ex，sym(lxcpass)，yyb<br>其他昵称B站账号均为盗取 <span class="title-badge">更新日志</span></h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 返回主页</a>
                <a href="betacentre.html" class="nav-link">🔧 测试版发布中心</a>
                <a href="help.html" class="nav-link">❓ 帮助中心</a>
            </div>
            <p class="subtitle">记录所有版本的更新内容</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="total-count">0</div>
                    <div class="stat-label">总版本数</div>
                </div>
            </div>

            <div class="filters-group">
                <span class="filter-label">文件</span>
                <div class="filters" id="file-filters">
                    <button class="filter-btn active" data-filter="all" data-type="file">全部</button>
                    <button class="filter-btn" data-filter="主文件" data-type="file">主文件</button>
                    <button class="filter-btn" data-filter="测试版发布中心" data-type="file">测试版发布中心</button>
                    <button class="filter-btn" data-filter="更新日志" data-type="file">更新日志</button>
                </div>
            </div>

            <div class="filters-group">
                <span class="filter-label">类型</span>
                <div class="filters" id="type-filters">
                    <button class="filter-btn active" data-filter="all" data-type="version">全部</button>
                    <button class="filter-btn" data-filter="stable" data-type="version">正式版</button>
                    <button class="filter-btn" data-filter="beta" data-type="version">测试版</button>
                </div>
            </div>
        </header>

        <div id="cards-container" class="cards-grid"></div>

        <div class="footer">
            <p>© 2026 Android Intent 跳转助手 丨 更新日志</p>
        </div>
    </div>

    <button class="theme-btn" id="theme-btn">🌙</button>
    <div class="toast" id="toast"></div>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        const state = {
            fileFilter: 'all',
            versionFilter: 'all'
        };
        
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && prefersDark.matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = '🌙';
            }
            
            themeBtn.onclick = () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    themeBtn.textContent = '🌙';
                    localStorage.setItem('theme', 'light');
                    showToast('已切换到浅色主题', 'info');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeBtn.textContent = '☀️';
                    localStorage.setItem('theme', 'dark');
                    showToast('已切换到深色主题', 'info');
                }
            };
        }

        const updateLogs = [
            {
                id: 1,
                title: "1.0.5版",
                desc: "修复了一些已知问题",
                ownerText: "主文件",
                versionTypeText: "正式版",
                versionTypeKey: "stable",
                updateTime: "2026-02-19"
            },
            {
                id: 2,
                title: "Beta2602201601版",
                desc: "修复Beta版标志显示问题<br>增加可用性标注",
                ownerText: "主文件",
                versionTypeText: "测试版",
                versionTypeKey: "beta",
                updateTime: "2026-02-20"
            },
            {
                id: 3,
                title: "Beta2602201627版",
                desc: "header栏增加超链接至其他页面",
                ownerText: "主文件",
                versionTypeText: "测试版",
                versionTypeKey: "beta",
                updateTime: "2026-02-20"
            },
            {
                id: 4,
                title: "1版",
                desc: "测试版发布中心页面正式发布",
                ownerText: "测试版发布中心",
                versionTypeText: "正式版",
                versionTypeKey: "stable",
                updateTime: "2026-02-20"
            },
            {
                id: 5,
                title: "1版",
                desc: "更新日志页面正式发布",
                ownerText: "更新日志",
                versionTypeText: "正式版",
                versionTypeKey: "stable",
                updateTime: "2026-02-20"
            },
            {
                id: 6,
                title: "1.0.6",
                desc: "修复了一些已知问题",
                ownerText: "主文件",
                versionTypeText: "正式版",
                versionTypeKey: "stable",
                updateTime: "2026-02-20"
            },
            {
                id: 7,
                title: "Beta2602211327版",
                desc: "更新了50个Intent",
                ownerText: "主文件",
                versionTypeText: "测试版",
                versionTypeKey: "beta",
                updateTime: "2026-02-21"
            },
            {
                id: 8,
                title: "2版",
                desc: "增加筛选功能",
                ownerText: "更新日志",
                versionTypeText: "正式版",
                versionTypeKey: "stable",
                updateTime: "2026-02-21"
            },
            {
                id: 9,
                title: "2版",
                desc: "修复了一些已知问题",
                ownerText: "测试版发布中心",
                versionTypeText: "正式版",
                versionTypeKey: "stable",
                updateTime: "2026-02-21"
            },
            {
                id: 10,
                title: "Beta2602211327_2版",
                desc: "修复方法无法显示的bug",
                ownerText: "主文件",
                versionTypeText: "测试版",
                versionTypeKey: "beta",
                updateTime: "2026-02-22"
            },
            {
                id: 11,
                title: "Beta2602232048版",
                desc: "微调",
                ownerText: "主文件",
                versionTypeText: "测试版",
                versionTypeKey: "beta",
                updateTime: "2026-02-23"
            },
            {
                id: 12,
                title: "Beta2602261737版",
                desc: "1.调整Ui，更新液态玻璃效果，更新按钮圆角<br>部分按钮为适配液态玻璃增加背景",
                ownerText: "主文件",
                versionTypeText: "测试版",
                versionTypeKey: "beta",
                updateTime: "2026-02-23"
            },
            {
                id: 13,
                title: "1.1.0版",
                desc: "同步Beta2602261737版更新",
                ownerText: "主文件",
                versionTypeText: "正式版",
                versionTypeKey: "stable",
                updateTime: "2026-02-28"
            },
            {
                id: 14,
                title: "1.1.0版",
                desc: "版本回退",
                ownerText: "主文件",
                versionTypeText: "正式版",
                versionTypeKey: "stable",
                updateTime: "2026-03-29"
            },
            {
                id: 15,
                title: "2026愚人节特别版",
                desc: "可恶的Floruit，怎么把网站拿去卖钱了（bushi）<br>每次点击有概率弹出付费使用提示，点了有惊喜？<br>声明:本项目永久开源免费，收费仅为恶搞，如发现收费售卖源码/网站/方法，请向1964993179@qq.com举报",
                ownerText: "主文件",
                versionTypeText: "正式版",
                versionTypeKey: "stable",
                updateTime: "2026-04-01"
            }
        ];

        function renderCards() {
            try {
                const container = document.getElementById('cards-container');
                if (!container) return;

                let filteredLogs = updateLogs;
                if (state.fileFilter !== 'all') {
                    filteredLogs = filteredLogs.filter(item => item.ownerText === state.fileFilter);
                }
                if (state.versionFilter !== 'all') {
                    filteredLogs = filteredLogs.filter(item => item.versionTypeKey === state.versionFilter);
                }

                let html = '';
                [...filteredLogs].reverse().forEach((item) => {
                    html += `
                        <div class="card">
                            <div class="card-header">
                                <div class="card-type owner">${item.ownerText}</div>
                                <div class="card-type ${item.versionTypeKey}">${item.versionTypeText}</div>
                            </div>
                            <div class="card-title">${item.title}</div>
                            <div class="card-desc">${item.desc}</div>
                            <div class="card-meta">更新时间：${item.updateTime}</div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                document.getElementById('total-count').textContent = updateLogs.length;
            } catch (error) {
                showToast('页面加载出错', 'error');
            }
        }

        let toastTimer = null;
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast';
            toast.classList.add(type);
            toast.classList.add('show');
            
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function init() {
            initTheme();
            renderCards();

            document.querySelectorAll('#file-filters .filter-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('#file-filters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.fileFilter = btn.dataset.filter;
                    renderCards();
                };
            });

            document.querySelectorAll('#type-filters .filter-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('#type-filters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.versionFilter = btn.dataset.filter;
                    renderCards();
                };
            });

            setTimeout(() => showToast('更新日志页面已就绪', 'success'), 300);
        }

        document.readyState === 'loading' 
            ? document.addEventListener('DOMContentLoaded', init) 
            : init();
    </script>
</body>
</html>
