<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试版发布中心 - Android Intent跳转助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #f5f5f5;
            --bg2: #ffffff;
            --text: #333333;
            --text2: #666666;
            --primary: #1890ff;
            --primary-light: #40a9ff;
            --primary-dark: #096dd9;
            --border: #e8e8e8;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --bg2: #1e1e1e;
            --text: #ffffff;
            --text2: #aaaaaa;
            --primary: #40a9ff;
            --primary-light: #69c0ff;
            --primary-dark: #1890ff;
            --border: #303030;
            --shadow: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            padding: 20px 16px;
            min-height: 100vh;
            transition: var(--transition);
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 16px;
            word-break: break-word;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        h1 .beta-badge {
            background: #fa8c16;
            color: white;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin: 8px 0 16px;
            flex-wrap: wrap;
        }
        
       .nav-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .nav-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
            transform: translateY(-1px);
        }

        .subtitle {
            color: var(--text2);
            margin: 0 auto 12px;
            padding: 12px 16px;
            background: var(--bg2);
            border-radius: var(--radius);
            max-width: 900px;
            border-left: 4px solid var(--primary);
            word-break: break-word;
            font-size: 1.05rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 16px 24px;
            background: var(--bg2);
            border-radius: var(--radius);
            min-width: 120px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .stat-item:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text2);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 32px;
            justify-content: center;
            max-width: 100%;
            padding: 0 8px;
        }

        .filter-btn {
            padding: 10px 20px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: var(--transition);
            font-weight: 500;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 6px rgba(24, 144, 255, 0.3);
        }

        .filter-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
            width: 100%;
        }

        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            word-break: break-word;
            overflow-wrap: break-word;
            transition: var(--transition);
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
            transform: translateY(-3px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-badge {
            padding: 4px 10px;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .card-type {
            font-size: 0.75rem;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            white-space: nowrap;
            font-weight: 500;
        }
        .card-type.latest { background: #52c41a; }
        .card-type.beta { background: #fa8c16; }

        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--text);
            line-height: 1.4;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .card-desc {
            color: var(--text2);
            font-size: 0.9rem;
            margin-bottom: 12px;
            line-height: 1.5;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .card-meta {
            color: var(--text2);
            font-size: 0.8rem;
            margin-bottom: 14px;
            font-family: 'Courier New', Consolas, Monaco, monospace;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 14px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            white-space: nowrap;
            min-width: 90px;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: #bfbfbf;
            cursor: not-allowed;
            transform: none;
        }

        .footer {
            text-align: center;
            color: var(--text2);
            font-size: 0.9rem;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            word-break: break-word;
        }

        .theme-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.4rem;
            z-index: 100;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-hover);
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 400px;
            width: 90%;
            text-align: center;
            word-break: break-word;
        }

        .toast.show { 
            opacity: 1; 
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: #52c41a; }
        .toast.error { background: #ff4d4f; }
        .toast.warning { background: #fa8c16; }
        .toast.info { background: var(--primary); }

        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            body { padding: 12px; }
            h1 { font-size: 1.8rem; }
            .stat-item { min-width: 100px; padding: 12px 16px; }
            .filter-btn { padding: 8px 16px; font-size: 0.85rem; }
            .nav-links { gap: 12px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            h1 .beta-badge { font-size: 0.8rem; padding: 1px 6px; }
            .subtitle { font-size: 0.95rem; padding: 10px 12px; }
            .stats { gap: 12px; }
            .stat-value { font-size: 1.5rem; }
            .card { padding: 16px; }
        }

        @media (min-width: 1600px) {
            .container { max-width: 1600px; }
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>测试版发布中心 <br>开发：Fusion_ex，lxcpass，yyb<br>其他昵称B站账号(如王嘉宁)均为盗取<span class="beta-badge">2版</span></h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 返回主页</a>
                <a href="help.html" class="nav-link">❓ 帮助中心</a>
                <a href="updatelog.html" class="nav-link">📝 更新日志</a>
            </div>
            <p class="subtitle">点击对应版本的「立即跳转」按钮，即可打开对应测试版本的页面</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="total-count">3</div>
                    <div class="stat-label">总测试版本</div>
                </div>
            </div>
        </header>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">全部测试版</button>
            <button class="filter-btn" data-filter="latest">最新测试版</button>
        </div>

        <div id="cards-container" class="cards-grid"></div>

        <div class="footer">
            <p>© 2026 Android Intent 跳转助手 丨 测试版发布中心</p>
        </div>
    </div>

    <button class="theme-btn" id="theme-btn">🌙</button>
    <div class="toast" id="toast"></div>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && prefersDark.matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = '🌙';
            }
            
            themeBtn.onclick = () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    themeBtn.textContent = '🌙';
                    localStorage.setItem('theme', 'light');
                    showToast('已切换到浅色主题', 'info');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeBtn.textContent = '☀️';
                    localStorage.setItem('theme', 'dark');
                    showToast('已切换到深色主题', 'info');
                }
            };
        }

        const versions = [
            {
                id: 1,
                title: "Beta3",
                desc: "无记录",
                updateTime: "无记录",
                path: "beta3.html",
                type: "beta"
            },
            {
                id: 2,
                title: "Beta2602201601版",
                desc: "见更新日志",
                updateTime: "2026-02-20",
                path: "beta2602201601.html",
                type: "beta"
            },
            {
                id: 3,
                title: "Beta2602201627版",
                desc: "新增测试版发布中心，其他更新见更新日志",
                updateTime: "2026-02-20",
                path: "beta2602201627.html",
                type: "beta"
            },
            {
                id: 4,
                title: "Beta2602211327版(已撤回发布)",
                desc: "见更新日志",
                updateTime: "2026-02-21",
                path: "vr.html",
                type: "beta"
            },
            {
                id: 5,
                title: "Beta2602211327_2版",
                desc: "见更新日志",
                updateTime: "2026-02-22",
                path: "beta2602211327_2.html",
                type: "beta"
            },
            {
                id: 6,
                title: "Beta2602232048版",
                desc: "见更新日志",
                updateTime: "2026-02-23",
                path: "beta2602232048.html",
                type: "beta"
            },
            {
                id: 7,
                title: "Beta2602261737版",
                desc: "见更新日志",
                updateTime: "2026-02-26",
                path: "beta2602261737.html",
                type: "beta"
            },
            {
                id: 8,
                title: "Beta2604011628版",
                desc: "2026愚人节特别版<br>本次更新：增加了一些未知问题<br>解决了一些提出已知问题的用户",
                updateTime: "2026-04-01",
                path: "beta2604011628.html",
                type: "latest"
            }
        ];

        const state = {
            filter: 'all'
        };

        function renderCards() {
            try {
                const container = document.getElementById('cards-container');
                if (!container) return;

                const filtered = state.filter === 'all' 
                    ? versions 
                    : versions.filter(i => i.type === state.filter);
                
                let html = '';
                filtered.sort((a, b) => b.id - a.id).forEach((item) => {
                    const title = item.title || '未知版本';
                    const desc = item.desc || '无描述';
                    const path = item.path || '#';
                    const type = item.type || 'beta';
                    const id = item.id || Math.random();
                    const updateTime = item.updateTime || '未知时间';
                    const typeText = type === 'latest' ? '最新测试版' : '测试版';

                    html += `
                        <div class="card">
                            <div class="card-header">
                                <div class="card-badge">测试版</div>
                                <div class="card-type ${type}">${typeText}</div>
                            </div>
                            <div class="card-title">${title}</div>
                            <div class="card-desc">${desc}</div>
                            <div class="card-meta">更新时间：${updateTime}</div>
                            <div class="card-actions">
                                <button class="btn btn-primary" onclick="jumpToPage('${path}', ${id})">立即跳转</button>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                document.getElementById('total-count').textContent = versions.length;
            } catch (error) {
                console.error('渲染卡片出错:', error);
                showToast('页面加载出错: ' + error.message, 'error');
            }
        }

        function jumpToPage(path, id) {
            showToast(`正在跳转...`, 'info');
            try {
                window.location.href = path;
            } catch(e) {
                showToast(`跳转失败: ${e.message}`, 'error');
            }
        }

        let toastTimer = null;
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast';
            toast.classList.add(type);
            toast.classList.add('show');
            
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.filter = btn.dataset.filter;
                renderCards();
            };
        });

        function init() {
            initTheme();
            renderCards();
            setTimeout(() => {
                showToast('就绪', 'success');
            }, 300);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
