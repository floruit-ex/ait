<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Intent跳转助手 - Beta版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #f5f5f5;
            --bg2: #ffffff;
            --text: #333333;
            --text2: #666666;
            --primary: #1890ff;
            --primary-light: #40a9ff;
            --primary-dark: #096dd9;
            --border: #e8e8e8;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --bg2: #1e1e1e;
            --text: #ffffff;
            --text2: #aaaaaa;
            --primary: #40a9ff;
            --primary-light: #69c0ff;
            --primary-dark: #1890ff;
            --border: #303030;
            --shadow: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            padding: 20px 16px;
            min-height: 100vh;
            transition: var(--transition);
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 16px;
            word-break: break-word;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        h1 .beta-badge {
            background: #fa8c16;
            color: white;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
        }
        
       .help-link {
            display: inline-block;
            margin: 8px 0 16px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition);
        }

        .help-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
            transform: translateY(-1px);
        }


        .subtitle {
            color: var(--text2);
            margin: 0 auto 12px;
            padding: 12px 16px;
            background: var(--bg2);
            border-radius: var(--radius);
            max-width: 900px;
            border-left: 4px solid var(--primary);
            word-break: break-word;
            font-size: 1.05rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 16px 24px;
            background: var(--bg2);
            border-radius: var(--radius);
            min-width: 120px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .stat-item:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text2);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 32px;
            justify-content: center;
            max-width: 100%;
            padding: 0 8px;
        }

        .filter-btn {
            padding: 10px 20px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: var(--transition);
            font-weight: 500;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 6px rgba(24, 144, 255, 0.3);
        }

        .filter-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            body { padding: 12px; }
            h1 { font-size: 1.8rem; }
            .stat-item { min-width: 100px; padding: 12px 16px; }
            .filter-btn { padding: 8px 16px; font-size: 0.85rem; }
        }

        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            word-break: break-word;
            overflow-wrap: break-word;
            transition: var(--transition);
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
            transform: translateY(-3px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-badge {
            padding: 4px 10px;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .card-type {
            font-size: 0.75rem;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            white-space: nowrap;
            font-weight: 500;
        }
        .card-type.available { background: #52c41a; }
        .card-type.partial { background: #fa8c16; }
        .card-type.unavailable { background: #8c8c8c; }

        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--text);
            line-height: 1.4;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .card-desc {
            color: var(--text2);
            font-size: 0.9rem;
            margin-bottom: 12px;
            line-height: 1.5;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .card-path {
            background: var(--bg);
            padding: 10px;
            border-radius: var(--radius);
            font-family: 'Courier New', Consolas, Monaco, monospace;
            font-size: 0.8rem;
            margin-bottom: 14px;
            word-break: break-all;
            word-wrap: break-word;
            white-space: pre-wrap;
            border: 1px solid var(--border);
            max-width: 100%;
            overflow: visible;
            user-select: all;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 14px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            white-space: nowrap;
            min-width: 90px;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: #bfbfbf;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            flex: 1;
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .form-container {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: var(--shadow);
        }

        .form-title {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-input {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            width: 100%;
            box-sizing: border-box;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .form-actions .btn {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
        }

        .footer {
            text-align: center;
            color: var(--text2);
            font-size: 0.9rem;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            word-break: break-word;
        }

        .theme-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.4rem;
            z-index: 100;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-hover);
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 400px;
            width: 90%;
            text-align: center;
            word-break: break-word;
        }

        .toast.show { 
            opacity: 1; 
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: #52c41a; }
        .toast.error { background: #ff4d4f; }
        .toast.warning { background: #fa8c16; }
        .toast.info { background: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Android Intent跳转助手 <span class="beta-badge">Beta</span></h1>
            <a href="help.html" class="help-link">❓ 帮助中心</a>
            <a href="updatelog.html" class="help-link">📝 更新日志</a>
            <a href="index.html" class="help-link">🏠 正式版</a>
            <p class="subtitle">不稳定版本，遇到BUG请及时反馈</p>
            <p class="subtitle">适用于 Google Chrome
，悟空浏览器，今日头条(含极速版)，夸克。其他未测试</p>
            <p class="subtitle">不适用于 WPS，微信，QQ，钉钉，Edge，知乎，讯飞输入法。其他未测试</p>
            <p class="subtitle">不完全适用 Via(部分显性Intent无法跳转)</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="total-count">50</div>
                    <div class="stat-label">总方法数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="custom-count">0</div>
                    <div class="stat-label">自定义</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="attempt-count">0</div>
                    <div class="stat-label">尝试次数</div>
                </div>
            </div>
        </header>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="developer">开发者选项</button>
            <button class="filter-btn" data-filter="about">关于设备</button>
            <button class="filter-btn" data-filter="accessibility">无障碍</button>
            <button class="filter-btn" data-filter="security">安全设置</button>
            <button class="filter-btn" data-filter="vpn">VPN设置</button>
            <button class="filter-btn" data-filter="apn">APN设置</button>
            <button class="filter-btn" data-filter="bluetooth">蓝牙设置</button>
            <button class="filter-btn" data-filter="wifi">WiFi设置</button>
            <button class="filter-btn" data-filter="battery">电池设置</button>
            <button class="filter-btn" data-filter="app">应用管理</button>
            <button class="filter-btn" data-filter="display">显示设置</button>
            <button class="filter-btn" data-filter="sound">声音设置</button>
            <button class="filter-btn" data-filter="storage">存储设置</button>
            <button class="filter-btn" data-filter="location">定位设置</button>
            <button class="filter-btn" data-filter="notification">通知设置</button>
            <button class="filter-btn" data-filter="hotspot">个人热点</button>
            <button class="filter-btn" data-filter="account">账户设置</button>
            <button class="filter-btn" data-filter="language">语言设置</button>
            <button class="filter-btn" data-filter="system">系统设置</button>
            <button class="filter-btn" data-filter="custom">自定义</button>
        </div>

        <div id="cards-container" class="cards-grid"></div>

        <div class="form-container">
            <div class="form-title">添加自定义Intent</div>
            <div class="form-grid">
                <input type="text" class="form-input" id="custom-package" placeholder="包名" value="com.android.settings">
                <input type="text" class="form-input" id="custom-classname" placeholder="完整类名">
                <input type="text" class="form-input" id="custom-name" placeholder="显示名称">
                <input type="text" class="form-input" id="custom-desc" placeholder="描述信息">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" id="clear-btn">清空</button>
                <button class="btn btn-primary" id="add-btn">添加</button>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 Android Intent 跳转助手 (Beta版) 丨© 2025 Catiflytek 小助手丨 <span id="success-count">0</span> 成功 | <span id="total-attempts">0</span> 尝试</p>
        </div>
    </div>

    <button class="theme-btn" id="theme-btn">🌙</button>
    <div class="toast" id="toast"></div>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && prefersDark.matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = '🌙';
            }
            
            themeBtn.onclick = () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    themeBtn.textContent = '🌙';
                    localStorage.setItem('theme', 'light');
                    showToast('已切换到浅色主题', 'info');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeBtn.textContent = '☀️';
                    localStorage.setItem('theme', 'dark');
                    showToast('已切换到深色主题', 'info');
                }
            };
        }

        const intents = [
            {id:1, title:"开发者选项 (Settings$DevelopmentSettingsActivity)", desc:"直接调用开发者选项Activity", path:"intent:#Intent;component=com.android.settings/.Settings$DevelopmentSettingsActivity;end", cat:"developer", type:"可跳转", status:"available"},
            {id:2, title:"开发者选项 (Settings$DevelopmentSettingsDashboardActivity)", desc:"新版开发者选项Dashboard", path:"intent:#Intent;component=com.android.settings/.Settings$DevelopmentSettingsDashboardActivity;end", cat:"developer", type:"部分系统可跳转", status:"partial"},
            {id:3, title:"开发者选项 (DevelopmentSettings)", desc:"旧版开发者设置", path:"intent:#Intent;component=com.android.settings/.DevelopmentSettings;end", cat:"developer", type:"疑似不可跳转", status:"unavailable"},
            {id:4, title:"开发者选项 (系统标准动作)", desc:"使用APPLICATION_DEVELOPMENT_SETTINGS动作", path:"intent:#Intent;action=android.settings.APPLICATION_DEVELOPMENT_SETTINGS;end", cat:"developer", type:"可跳转", status:"available"},
            {id:5, title:"开发者选项 (加载设置片段)", desc:"在SubSettings中加载DevelopmentSettingsDashboardFragment", path:"intent:#Intent;component=com.android.settings/.SubSettings;S.%3Asettings%3Ashow_fragment=com.android.settings.development.DevelopmentSettingsDashboardFragment;end", cat:"developer", type:"部分系统可跳转", status:"partial"},
            {id:6, title:"开发者选项 (Activity+Fragment)", desc:"通过SettingsActivity加载开发者选项Fragment", path:"intent:#Intent;action=android.intent.action.MAIN;launchFlags=0x10810000;component=com.android.settings/.SettingsActivity;S.%3Asettings%3Ashow_fragment=com.android.settings.development.DevelopmentSettingsDashboardFragment;end", cat:"developer", type:"部分系统可跳转", status:"partial"},
            {id:7, title:"关于设备 (DeviceInfoSettingsActivity)", desc:"设备信息设置", path:"intent:#Intent;component=com.android.settings/.Settings$DeviceInfoSettingsActivity;end", cat:"about", type:"可跳转", status:"available"},
            {id:8, title:"关于设备 (MyDeviceInfoActivity)", desc:"我的设备信息", path:"intent:#Intent;component=com.android.settings/.Settings$MyDeviceInfoActivity;end", cat:"about", type:"疑似不可跳转", status:"unavailable"},
            {id:9, title:"无障碍设置 (AccessibilitySettingsActivity)", desc:"无障碍设置页面", path:"intent:#Intent;component=com.android.settings/.Settings$AccessibilitySettingsActivity;end", cat:"accessibility", type:"可跳转", status:"available"},
            {id:10, title:"安全设置 (SecurityDashboardActivity)", desc:"安全设置Dashboard", path:"intent:#Intent;component=com.android.settings/.Settings$SecurityDashboardActivity;end", cat:"security", type:"部分系统可跳转", status:"partial"},
            {id:11, title:"VPN设置 (VpnSettingsActivity)", desc:"VPN设置页面", path:"intent:#Intent;component=com.android.settings/.Settings$VpnSettingsActivity;end", cat:"vpn", type:"可跳转", status:"available"},
            {id:12, title:"APN设置 (ApnSettingsActivity)", desc:"APN设置页面", path:"intent:#Intent;component=com.android.settings/.Settings$ApnSettingsActivity;end", cat:"apn", type:"可跳转", status:"available"},
            {id:13, title:"受信任凭据 (TrustedCredentialsSettingsActivity)", desc:"证书管理", path:"intent:#Intent;component=com.android.settings/.Settings$TrustedCredentialsSettingsActivity;end", cat:"security", type:"可跳转", status:"available"},
            {id:14, title:"设置搜索栏 (SearchActivity)", desc:"Android设置智能搜索", path:"intent:#Intent;component=com.android.settings.intelligence/com.android.settings.intelligence.search.SearchActivity;end", cat:"search", type:"疑似不可跳转", status:"unavailable"},
            {id:15, title:"设备管理 (DeviceAdminSettingsActivity)", desc:"设备管理员设置", path:"intent:#Intent;component=com.android.settings/.Settings$DeviceAdminSettingsActivity;end", cat:"security", type:"可跳转", status:"available"},
            {id:16, title:"设备管理 (DeviceAdminSettings)", desc:"设备管理员设置类", path:"intent:#Intent;component=com.android.settings/.DeviceAdminSettings;end", cat:"security", type:"疑似不可跳转", status:"unavailable"},
            {id:17, title:"设备管理 (DeviceAdminAdd)", desc:"设备管理员添加页面", path:"intent:#Intent;component=com.android.settings/.applications.specialaccess.deviceadmin.DeviceAdminAdd;end", cat:"security", type:"可跳转", status:"available"},
            {id:18, title:"设备管理 (EnterprisePrivacySettingsActivity)", desc:"企业隐私设置", path:"intent:#Intent;component=com.android.settings/.Settings$EnterprisePrivacySettingsActivity;end", cat:"security", type:"部分系统可跳转", status:"partial"},
            {id:19, title:"系统设置 (SystemDashboardActivity)", desc:"系统设置Dashboard", path:"intent:#Intent;component=com.android.settings/.Settings$SystemDashboardActivity;end", cat:"system", type:"部分系统可跳转", status:"partial"},
            {id:20, title:"设置建议 (SearchActivity)", desc:"设置建议页面", path:"intent:#Intent;component=com.android.settings.intelligence/com.android.settings.intelligence.search.SearchActivity;end", cat:"search", type:"疑似不可跳转", status:"unavailable"},
            {id:21, title:"原生设置界面 (SettingsHomepageActivity)", desc:"Android设置主页", path:"intent:#Intent;component=com.android.settings/.homepage.SettingsHomepageActivity;end", cat:"system", type:"部分系统可跳转", status:"partial"},
            {id:22, title:"蓝牙设置 (BluetoothSettingsActivity)", desc:"蓝牙设置主页面", path:"intent:#Intent;component=com.android.settings/.Settings$BluetoothSettingsActivity;end", cat:"bluetooth", type:"可跳转", status:"available"},
            {id:23, title:"蓝牙设置 (系统标准动作)", desc:"使用BLUETOOTH_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.BLUETOOTH_SETTINGS;end", cat:"bluetooth", type:"可跳转", status:"available"},
            {id:24, title:"WiFi设置 (WifiSettingsActivity)", desc:"WiFi设置主页面", path:"intent:#Intent;component=com.android.settings/.Settings$WifiSettingsActivity;end", cat:"wifi", type:"可跳转", status:"available"},
            {id:25, title:"WiFi设置 (系统标准动作)", desc:"使用WIFI_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.WIFI_SETTINGS;end", cat:"wifi", type:"可跳转", status:"available"},
            {id:26, title:"WiFi详情 (WifiInfoActivity)", desc:"当前连接WiFi详情", path:"intent:#Intent;component=com.android.settings/.wifi.WifiInfoActivity;end", cat:"wifi", type:"部分系统可跳转", status:"partial"},
            {id:27, title:"电池设置 (BatterySaverSettingsActivity)", desc:"省电模式设置", path:"intent:#Intent;component=com.android.settings/.Settings$BatterySaverSettingsActivity;end", cat:"battery", type:"部分系统可跳转", status:"partial"},
            {id:28, title:"电池设置 (BatterySettingsActivity)", desc:"电池使用情况统计", path:"intent:#Intent;component=com.android.settings/.Settings$BatterySettingsActivity;end", cat:"battery", type:"可跳转", status:"available"},
            {id:29, title:"电池设置 (系统标准动作)", desc:"使用BATTERY_SAVER_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.BATTERY_SAVER_SETTINGS;end", cat:"battery", type:"可跳转", status:"available"},
            {id:30, title:"应用管理 (ManageApplicationsActivity)", desc:"所有应用管理页面", path:"intent:#Intent;component=com.android.settings/.Settings$ManageApplicationsActivity;end", cat:"app", type:"可跳转", status:"available"},
            {id:31, title:"应用信息 (AppInfoSettings)", desc:"指定应用信息页面（需传包名参数）", path:"intent:#Intent;component=com.android.settings/.applications.appinfo.AppInfoSettings;end", cat:"app", type:"疑似不可跳转", status:"unavailable"},
            {id:32, title:"应用权限 (ApplicationPermissionsActivity)", desc:"应用权限管理", path:"intent:#Intent;component=com.android.settings/.Settings$ApplicationPermissionsActivity;end", cat:"app", type:"可跳转", status:"available"},
            {id:33, title:"显示设置 (DisplaySettingsActivity)", desc:"显示设置主页面", path:"intent:#Intent;component=com.android.settings/.Settings$DisplaySettingsActivity;end", cat:"display", type:"可跳转", status:"available"},
            {id:34, title:"字体设置 (FontSettingsActivity)", desc:"系统字体大小/样式设置", path:"intent:#Intent;component=com.android.settings/.Settings$FontSettingsActivity;end", cat:"display", type:"疑似不可跳转", status:"unavailable"},
            {id:35, title:"亮度设置 (BrightnessSettings)", desc:"屏幕亮度调节", path:"intent:#Intent;component=com.android.settings/.display.BrightnessSettings;end", cat:"display", type:"部分系统可跳转", status:"partial"},
            {id:36, title:"声音设置 (SoundSettingsActivity)", desc:"声音设置主页面", path:"intent:#Intent;component=com.android.settings/.Settings$SoundSettingsActivity;end", cat:"sound", type:"可跳转", status:"available"},
            {id:37, title:"声音设置 (系统标准动作)", desc:"使用SOUND_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.SOUND_SETTINGS;end", cat:"sound", type:"可跳转", status:"available"},
            {id:38, title:"存储设置 (StorageSettingsActivity)", desc:"存储管理主页面", path:"intent:#Intent;component=com.android.settings/.Settings$StorageSettingsActivity;end", cat:"storage", type:"可跳转", status:"available"},
            {id:39, title:"存储设置 (系统标准动作)", desc:"使用INTERNAL_STORAGE_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.INTERNAL_STORAGE_SETTINGS;end", cat:"storage", type:"可跳转", status:"available"},
            {id:40, title:"定位设置 (LocationSettingsActivity)", desc:"位置信息设置主页面", path:"intent:#Intent;component=com.android.settings/.Settings$LocationSettingsActivity;end", cat:"location", type:"部分系统可跳转", status:"partial"},
            {id:41, title:"定位设置 (系统标准动作)", desc:"使用LOCATION_SOURCE_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end", cat:"location", type:"可跳转", status:"available"},
            {id:42, title:"通知设置 (NotificationSettingsActivity)", desc:"应用通知管理", path:"intent:#Intent;component=com.android.settings/.Settings$NotificationSettingsActivity;end", cat:"notification", type:"部分系统可跳转", status:"partial"},
            {id:43, title:"通知设置 (系统标准动作)", desc:"使用NOTIFICATION_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.NOTIFICATION_SETTINGS;end", cat:"notification", type:"可跳转", status:"available"},
            {id:44, title:"个人热点 (TetherSettings)", desc:"移动网络共享/热点设置", path:"intent:#Intent;component=com.android.settings/.TetherSettings;end", cat:"hotspot", type:"可跳转", status:"available"},
            {id:45, title:"个人热点 (系统标准动作)", desc:"使用TETHER_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.TETHER_SETTINGS;end", cat:"hotspot", type:"可跳转", status:"available"},
            {id:46, title:"账户设置 (AccountSettingsActivity)", desc:"账户与同步设置", path:"intent:#Intent;component=com.android.settings/.Settings$AccountSettingsActivity;end", cat:"account", type:"可跳转", status:"available"},
            {id:47, title:"账户设置 (系统标准动作)", desc:"使用ADD_ACCOUNT_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.ADD_ACCOUNT_SETTINGS;end", cat:"account", type:"可跳转", status:"available"},
            {id:48, title:"语言设置 (LanguageSettingsActivity)", desc:"系统语言设置", path:"intent:#Intent;component=com.android.settings/.Settings$LanguageSettingsActivity;end", cat:"language", type:"可跳转", status:"available"},
            {id:49, title:"语言设置 (系统标准动作)", desc:"使用LOCALE_SETTINGS系统动作", path:"intent:#Intent;action=android.settings.LOCALE_SETTINGS;end", cat:"language", type:"可跳转", status:"available"},
            {id:50, title:"日期时间设置 (DateTimeSettingsActivity)", desc:"日期和时间设置", path:"intent:#Intent;component=com.android.settings/.Settings$DateTimeSettingsActivity;end", cat:"system", type:"可跳转", status:"available"}
        ];

        const state = {
            attempts: 0,
            successes: 0,
            filter: 'all',
            customIntents: []
        };

        const catNames = {
            developer: '开发者选项',
            about: '关于设备',
            accessibility: '无障碍',
            security: '安全设置',
            vpn: 'VPN设置',
            apn: 'APN设置',
            bluetooth: '蓝牙设置',
            wifi: 'WiFi设置',
            battery: '电池设置',
            app: '应用管理',
            display: '显示设置',
            sound: '声音设置',
            storage: '存储设置',
            location: '定位设置',
            notification: '通知设置',
            hotspot: '个人热点',
            account: '账户设置',
            language: '语言设置',
            system: '系统设置',
            search: '搜索栏',
            custom: '自定义'
        };

        function renderCards() {
            try {
                const container = document.getElementById('cards-container');
                if (!container) {
                    console.error('卡片容器不存在');
                    return;
                }

                let customList = [];
                try {
                    const savedCustom = localStorage.getItem('customIntentsBeta');
                    customList = savedCustom ? JSON.parse(savedCustom) : [];
                } catch (e) {
                    console.error('读取自定义Intent失败', e);
                    customList = [];
                }
                state.customIntents = customList;

                const customIntentsWithId = customList.map((c, i) => ({
                    ...c,
                    id: 2000 + i,
                    cat: 'custom',
                    type: '自定义',
                    status: 'available'
                }));
                const allIntents = [...intents, ...customIntentsWithId];
                
                const filtered = state.filter === 'all' 
                    ? allIntents 
                    : allIntents.filter(i => i.cat === state.filter);
                
                let html = '';
                filtered.forEach((item) => {
                    const title = item.title || '未知Intent';
                    const desc = item.desc || '无描述';
                    const path = item.path || '';
                    const cat = item.cat || 'other';
                    const type = item.type || '未知';
                    const status = item.status || 'partial';
                    const id = item.id || Math.random();

                    const escapedPath = encodeURIComponent(path).replace(/'/g, '&apos;').replace(/"/g, '&quot;');
                    
                    html += `
                        <div class="card">
                            <div class="card-header">
                                <div class="card-badge">${catNames[cat] || '其他'}</div>
                                <div class="card-type ${status}">${type}</div>
                            </div>
                            <div class="card-title">${title}</div>
                            <div class="card-desc">${desc}</div>
                            <div class="card-path">${path}</div>
                            <div class="card-actions">
                                <button class="btn btn-primary" onclick="tryLaunch('${escapedPath}', ${id})">尝试跳转</button>
                                <button class="btn btn-secondary" onclick="copyPath('${escapedPath}', ${id})">复制路径</button>
                                ${cat === 'custom' ? `<button class="btn btn-secondary" onclick="deleteIntent(${id})">删除</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                updateStats();
            } catch (error) {
                console.error('渲染卡片出错:', error);
                showToast('页面加载出错: ' + error.message, 'error');
            }
        }

        function updateStats() {
            const total = intents.length + state.customIntents.length;
            document.getElementById('total-count').textContent = total;
            document.getElementById('custom-count').textContent = state.customIntents.length;
            document.getElementById('attempt-count').textContent = state.attempts;
            document.getElementById('success-count').textContent = state.successes;
            document.getElementById('total-attempts').textContent = state.attempts;
        }

        function tryLaunch(path, id) {
            state.attempts++;
            showToast(`尝试跳转中... (ID: ${id})`, 'info');
            
            try {
                const decodedPath = decodeURIComponent(path);
                window.location.href = decodedPath;
                setTimeout(() => {
                    showToast('跳转可能被阻止', 'warning');
                }, 1000);
            } catch(e) {
                showToast(`跳转失败: ${e.message}`, 'error');
            }
            
            updateStats();
        }

        function copyPath(text, id) {
            const decodedText = decodeURIComponent(text);
            navigator.clipboard.writeText(decodedText).then(() => {
                showToast(`已复制到剪贴板`, 'success');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = decodedText;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板', 'success');
            });
        }

        function deleteIntent(id) {
            state.customIntents = state.customIntents.filter((_, i) => 2000 + i !== id);
            localStorage.setItem('customIntentsBeta', JSON.stringify(state.customIntents));
            renderCards();
            showToast('已删除', 'success');
        }

        document.getElementById('add-btn').onclick = () => {
            const pkg = document.getElementById('custom-package').value.trim();
            const cls = document.getElementById('custom-classname').value.trim();
            const name = document.getElementById('custom-name').value.trim();
            const desc = document.getElementById('custom-desc').value.trim();
            
            if (!pkg || !cls) {
                showToast('包名和类名不能为空', 'error');
                return;
            }
            
            const path = `intent:#Intent;component=${pkg}/${cls};end`;
            state.customIntents.push({
                title: name || `打开 ${cls}`,
                desc: desc || `自定义Intent: ${pkg}/${cls}`,
                path: path
            });
            
            localStorage.setItem('customIntentsBeta', JSON.stringify(state.customIntents));
            renderCards();
            showToast('添加成功', 'success');
            
            document.getElementById('custom-classname').value = '';
            document.getElementById('custom-name').value = '';
            document.getElementById('custom-desc').value = '';
        };

        document.getElementById('clear-btn').onclick = () => {
            document.getElementById('custom-package').value = 'com.android.settings';
            document.getElementById('custom-classname').value = '';
            document.getElementById('custom-name').value = '';
            document.getElementById('custom-desc').value = '';
            showToast('表单已清空', 'info');
        };

        let toastTimer = null;
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast';
            toast.classList.add(type);
            toast.classList.add('show');
            
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.filter = btn.dataset.filter;
                renderCards();
            };
        });

        function init() {
            initTheme();
            renderCards();
            setTimeout(() => {
                showToast('Android Intent Beta版已就绪', 'success');
            }, 300);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
